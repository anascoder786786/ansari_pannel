<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas Ansari Store | Elite Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2fe; --purple: #7000ff; --bg: #050505; --card: rgba(15, 15, 15, 0.98); --gold: #ffcc00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; font-weight: 700; } /* BOLD BY DEFAULT */
        
        body { background: var(--bg) url('background.jpg') no-repeat center center fixed; background-size: cover; color: #fff; }

        /* VIP Welcome Text */
        .vip-title { 
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem; text-align: center;
            background: linear-gradient(90deg, #fff, var(--neon), var(--purple), #fff);
            background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite; margin-bottom: 30px; font-weight: 900;
        }
        @keyframes flow { 0% { background-position: 0%; } 100% { background-position: 100%; } }

        /* Nav & Layout */
        #nav { display: none; justify-content: space-between; padding: 15px 30px; background: rgba(0,0,0,0.95); border-bottom: 3px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        
        /* Auth Cards */
        .auth-card { background: var(--card); padding: 50px 30px; border-radius: 30px; border: 2px solid var(--purple); text-align: center; margin-top: 10vh; box-shadow: 0 0 20px rgba(112, 0, 255, 0.4); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 2px solid #333; border-radius: 12px; color: #fff; font-weight: 900; }
        input:focus { border-color: var(--neon); outline: none; }

        .cta-btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--neon), var(--purple)); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 1.1rem; }
        .cta-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--neon); }

        /* Dashboard Items */
        .section-header { font-family: 'Orbitron'; color: var(--neon); margin: 50px 0 20px; border-left: 8px solid var(--purple); padding-left: 15px; font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }
        .card { background: var(--card); border-radius: 25px; padding: 30px; border: 2px solid #222; margin-bottom: 25px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--neon); }
        .card img { width: 110px; height: 110px; border-radius: 20px; border: 3px solid var(--neon); margin-bottom: 15px; }
        .price-tag { font-size: 2rem; color: #00ff88; font-weight: 900; margin: 15px 0; background: rgba(0,255,136,0.1); padding: 10px; border-radius: 15px; border: 2px solid #00ff88; }

        /* ADMIN PANEL */
        #admin-panel { display: none; background: #000; border: 3px solid var(--gold); padding: 30px; border-radius: 30px; margin-top: 30px; }
        .admin-item-row { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; }
        .admin-item-row input { width: 120px; margin: 0; text-align: center; border-color: var(--gold); color: var(--gold); }
        
        .footer { text-align: center; padding: 60px 20px; background: rgba(0,0,0,0.9); border-top: 3px solid var(--purple); margin-top: 100px; border-radius: 50px 50px 0 0; }
        .hidden { display: none; }
        h3 { font-weight: 900; color: var(--neon); }
    </style>
</head>
<body>

    <nav id="nav">
        <span style="font-family:'Orbitron'; color:var(--neon); font-weight:900; font-size: 1.2rem;">ANAS STORE</span>
        <button onclick="location.reload()" style="background:#ff2a6d; color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight: 900;">LOGOUT</button>
    </nav>

    <div class="container" id="auth-area">
        <div class="auth-card" id="login-box">
            <h1 class="vip-title">ANAS ANSARI STORE</h1>
            <p style="color:var(--neon); margin-bottom: 10px;">PREMIUM LOGIN</p>
            <input type="text" id="log-user" placeholder="USERNAME">
            <input type="password" id="log-pass" placeholder="PASSWORD">
            <button class="cta-btn" onclick="handleLogin()">ENTER STORE</button>
            <p style="margin-top:20px; color:var(--gold); cursor:pointer; font-weight: 900;" onclick="toggleAuth()">NEW USER? CREATE ACCOUNT</p>
        </div>

        <div class="auth-card hidden" id="signup-box">
            <h1 class="vip-title">JOIN THE ELITE</h1>
            <p style="color:var(--purple); margin-bottom: 10px;">CREATE YOUR ACCOUNT</p>
            <input type="text" id="reg-user" placeholder="CHOOSE USERNAME">
            <input type="password" id="reg-pass" placeholder="CHOOSE PASSWORD (MIN 8)">
            <button class="cta-btn" onclick="handleSignup()">CREATE ACCOUNT</button>
            <p style="margin-top:20px; color:var(--gold); cursor:pointer; font-weight: 900;" onclick="toggleAuth()">ALREADY A MEMBER? LOGIN</p>
        </div>
    </div>

    <div id="admin-panel" class="container">
        <h2 style="color:var(--gold); text-align:center; font-family:'Orbitron'; margin-bottom:30px; font-weight: 900;">MASTER PRICE CONTROLLER</h2>
        <div id="price-editor-list"></div>
        <hr style="margin:40px 0; opacity:0.2;">
        <h3 style="color:var(--neon); text-transform: uppercase;">+ Add New Item</h3>
        <select id="add-type">
            <option value="TikTok">TikTok Service</option>
            <option value="Instagram">Instagram Service</option>
            <option value="Facebook">Facebook Service</option>
            <option value="YouTube">YouTube Service</option>
            <option value="Courses">Course</option>
            <option value="Accounts">Account Sale</option>
        </select>
        <input type="text" id="add-name" placeholder="ITEM NAME">
        <input type="number" step="0.01" id="add-price" placeholder="PRICE IN PKR">
        <input type="text" id="add-img" placeholder="IMAGE NAME (e.g. hacking.png)">
        <button class="cta-btn" onclick="addItem()">ADD TO DATABASE</button>
        <button class="cta-btn" style="background:#fff; color:#000; margin-top:20px;" onclick="saveAdmin()">SAVE & REFRESH STORE</button>
    </div>

    <div id="dashboard" class="container hidden">
        <div id="tiktok-sec"></div>
        <div id="insta-sec"></div>
        <div id="fb-sec"></div>
        <div id="youtube-sec"></div>
        <div id="course-sec"></div>
        <div id="account-sec"></div>

        <div class="footer">
            <h2 style="color:var(--neon); font-family:'Orbitron'; font-weight: 900;">SELL YOUR ACCOUNTS</h2>
            <p style="margin:15px 0 25px; font-weight: 700;">TikTok, Facebook or YouTube Channels at Best Prices.</p>
            <button class="cta-btn" style="max-width:300px; background: #25D366; color: white;" onclick="window.open('https://wa.me/923246212898?text=I want to sell my account.')">WHATSAPP CONTACT</button>
            <p style="margin-top:40px; font-size:0.8rem; opacity:0.6; font-weight: 900;">ANAS ANSARI OFFICIAL STORE © 2026</p>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('anasEliteV9')) || {
            TikTok: [{n:'Likes', p:0.1}, {n:'Followers', p:0.95}],
            Instagram: [{n:'Likes', p:0.35}, {n:'Followers', p:0.75}],
            Facebook: [{n:'Page Followers', p:1.05}, {n:'Post Likes', p:0.5}],
            YouTube: [{n:'Subscribers', p:2.0}, {n:'Watchtime', p:2.5}],
            Courses: [
                {n:'Graphic Designing', p:500, img:'graphic.png'},
                {n:'Ethical Hacking', p:5000, img:'hacking.png'}
            ],
            Accounts: [{n:'Monetized TikTok USA', p:5500, img:'id.png'}]
        };

        function toggleAuth() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('signup-box').classList.toggle('hidden');
        }

        function handleSignup() {
            let u = document.getElementById('reg-user').value.trim().toLowerCase();
            let p = document.getElementById('reg-pass').value;
            if(!u || p.length < 8) return alert("Username required & Password 8+ characters!");
            
            if(localStorage.getItem('u_' + u)) return alert("Username already exists!");
            
            localStorage.setItem('u_' + u, p); 
            alert("Account Created Successfully!"); 
            toggleAuth();
        }

        function handleLogin() {
            let u = document.getElementById('log-user').value.trim().toLowerCase();
            let p = document.getElementById('log-pass').value;

            // Admin Bypass
            if(u === "anasraza786" && p === "anasraza786") {
                document.getElementById('auth-area').style.display = 'none';
                showAdmin();
                return;
            }

            let savedPass = localStorage.getItem('u_' + u);
            if(savedPass && savedPass === p) {
                window.currentUser = u;
                document.getElementById('auth-area').style.display = 'none';
                document.getElementById('nav').style.display = 'flex';
                document.getElementById('dashboard').classList.remove('hidden');
                renderStore();
            } else alert("Invalid Username or Password!");
        }

        function showAdmin() {
            document.getElementById('admin-panel').style.display = 'block';
            let list = document.getElementById('price-editor-list');
            list.innerHTML = "";
            for(let cat in db) {
                list.innerHTML += `<h4 style="color:var(--gold); margin:20px 0 10px; text-transform:uppercase;">${cat}</h4>`;
                db[cat].forEach((item, i) => {
                    list.innerHTML += `<div class="admin-item-row">
                        <span>${item.n}</span>
                        <div>
                            PKR: <input type="number" step="0.01" value="${item.p}" onchange="db['${cat}'][${i}].p = parseFloat(this.value)">
                            <button class="del-btn" onclick="db['${cat}'].splice(${i}, 1); showAdmin()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; margin-left:10px;">X</button>
                        </div>
                    </div>`;
                });
            }
        }

        function addItem() {
            let type = document.getElementById('add-type').value;
            let n = document.getElementById('add-name').value;
            let p = parseFloat(document.getElementById('add-price').value);
            let img = document.getElementById('add-img').value || 'default.png';
            if(n && p) { db[type].push({n, p, img}); showAdmin(); }
        }

        function saveAdmin() { localStorage.setItem('anasEliteV9', JSON.stringify(db)); location.reload(); }

        function renderStore() {
            const createBox = (id, title, cat, icon) => {
                let sec = document.getElementById(id);
                if(!db[cat] || db[cat].length === 0) return;
                let opts = db[cat].map(s => `<option value="${s.p}">${s.n}</option>`).join('');
                sec.innerHTML = `<div class="section-header">${title}</div>
                <div class="card">
                    <img src="${icon}">
                    <h3 style="margin-bottom:15px;">${cat.toUpperCase()} SERVICES</h3>
                    <select id="sel-${cat}" onchange="calc('${cat}')">${opts}</select>
                    <input type="number" id="qty-${cat}" value="1000" oninput="calc('${cat}')" placeholder="Quantity">
                    <input type="text" id="link-${cat}" placeholder="PASTE LINK HERE">
                    <div class="price-tag">PKR <span id="tot-${cat}">${(db[cat][0].p * 1000).toFixed(2)}</span></div>
                    <button class="cta-btn" onclick="sendOrder('${cat}')">ORDER NOW</button>
                </div>`;
            };

            createBox('tiktok-sec', 'TIKTOK SERVICES', 'TikTok', 'tiktok.png');
            createBox('insta-sec', 'INSTAGRAM SERVICES', 'Instagram', 'insta.png');
            createBox('fb-sec', 'FACEBOOK SERVICES', 'Facebook', 'fb.png');
            createBox('youtube-sec', 'YOUTUBE SERVICES', 'YouTube', 'youtube.png');

            let cSec = document.getElementById('course-sec');
            cSec.innerHTML = `<div class="section-header">PREMIUM COURSES</div>`;
            db.Courses.forEach(c => {
                cSec.innerHTML += `<div class="card"><img src="${c.img}"><h3>${c.n.toUpperCase()}</h3><div class="price-tag">PKR ${c.p}</div><button class="cta-btn" onclick="sendS('Course', '${c.n}', ${c.p})">GET COURSE</button></div>`;
            });

            let aSec = document.getElementById('account-sec');
            aSec.innerHTML = `<div class="section-header">ACCOUNTS FOR SALE</div>`;
            db.Accounts.forEach(a => {
                aSec.innerHTML += `<div class="card"><img src="${a.img}"><h3>${a.n.toUpperCase()}</h3><div class="price-tag">PKR ${a.p}</div><button class="cta-btn" onclick="sendS('Account', '${a.n}', ${a.p})">BUY NOW</button></div>`;
            });
        }

        function calc(cat) {
            let p = document.getElementById('sel-' + cat).value;
            let q = document.getElementById('qty-' + cat).value || 0;
            document.getElementById('tot-' + cat).innerText = (p * q).toFixed(2);
        }

        function sendOrder(cat) {
            let s = document.getElementById('sel-' + cat).options[document.getElementById('sel-' + cat).selectedIndex].text;
            let q = document.getElementById('qty-' + cat).value;
            let l = document.getElementById('link-' + cat).value;
            let t = document.getElementById('tot-' + cat).innerText;
            if(!l) return alert("Link missing!");
            window.open(`https://wa.me/923246212898?text=*ORDER*\nUser: ${window.currentUser}\nPlatform: ${cat}\nService: ${s}\nQty: ${q}\nLink: ${l}\n*Total: ${t} PKR*`);
        }

        function sendS(type, n, p) {
            window.open(`https://wa.me/923246212898?text=*${type} ORDER*\nUser: ${window.currentUser}\nItem: ${n}\n*Price: ${p} PKR*`);
        }
    </script>
</body>
</html>

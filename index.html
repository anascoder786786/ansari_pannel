<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas Ansari Store | Elite Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2fe; --purple: #7000ff; --bg: #050505; --card: rgba(15, 15, 15, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { background: var(--bg) url('background.jpg') no-repeat center center fixed; background-size: cover; color: #fff; }

        /* VIP Welcome Text */
        .vip-title { 
            font-family: 'Orbitron', sans-serif; font-size: 2rem; text-align: center;
            background: linear-gradient(90deg, #fff, var(--neon), var(--purple), #fff);
            background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite; margin-bottom: 30px;
        }
        @keyframes flow { 0% { background-position: 0%; } 100% { background-position: 100%; } }

        /* Nav & Layout */
        #nav { display: none; justify-content: space-between; padding: 15px 30px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon); sticky: top; z-index: 1000; }
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        
        /* Auth Cards */
        .auth-card { background: var(--card); padding: 50px 30px; border-radius: 30px; border: 1px solid rgba(0,242,254,0.3); text-align: center; margin-top: 10vh; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; }
        .cta-btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--neon), var(--purple)); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        /* Dashboard Items */
        .section-header { font-family: 'Orbitron'; color: var(--neon); margin: 50px 0 20px; border-left: 5px solid var(--purple); padding-left: 15px; }
        .card { background: var(--card); border-radius: 25px; padding: 30px; border: 1px solid #222; margin-bottom: 25px; text-align: center; }
        .card img { width: 100px; height: 100px; border-radius: 20px; border: 2px solid var(--neon); margin-bottom: 15px; }
        .price-tag { font-size: 1.8rem; color: #00ff88; font-weight: 900; margin: 15px 0; background: rgba(0,255,136,0.1); padding: 10px; border-radius: 15px; border: 1px solid #00ff88; }

        /* ADMIN PRICE EDITOR - THE REAL MAGIC */
        #admin-panel { display: none; background: #000; border: 2px solid gold; padding: 30px; border-radius: 30px; margin-top: 30px; }
        .admin-item-row { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #222; }
        .admin-item-row input { width: 100px; margin: 0; text-align: center; border-color: gold; color: gold; }
        .del-btn { background: #ff2a6d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 10px; }

        .footer { text-align: center; padding: 60px 20px; background: rgba(0,0,0,0.8); border-top: 2px solid var(--purple); margin-top: 100px; border-radius: 50px 50px 0 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav id="nav">
        <span style="font-family:'Orbitron'; color:var(--neon); font-weight:900;">ANAS STORE</span>
        <button onclick="location.reload()" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">LOGOUT</button>
    </nav>

    <div class="container" id="auth-area">
        <div class="auth-card" id="login-box">
            <h1 class="vip-title">WELCOME TO ANAS ANSARI STORE</h1>
            <input type="text" id="log-user" placeholder="Username">
            <input type="password" id="log-pass" placeholder="Password">
            <button class="cta-btn" onclick="handleLogin()">ENTER STORE</button>
            <p style="margin-top:20px; opacity:0.6; cursor:pointer;" onclick="toggleAuth()">New User? Create Account</p>
        </div>

        <div class="auth-card hidden" id="signup-box">
            <h1 class="vip-title">JOIN THE ELITE</h1>
            <input type="text" id="reg-user" placeholder="Choose Username">
            <input type="password" id="reg-pass" placeholder="Choose Password">
            <button class="cta-btn" onclick="handleSignup()">CREATE ACCOUNT</button>
            <p style="margin-top:20px; opacity:0.6; cursor:pointer;" onclick="toggleAuth()">Already a member? Login</p>
        </div>
    </div>

    <div id="admin-panel" class="container">
        <h2 style="color:gold; text-align:center; font-family:'Orbitron'; margin-bottom:30px;">MASTER PRICE CONTROLLER</h2>
        
        <div id="price-editor-list">
            </div>

        <hr style="margin:40px 0; opacity:0.2;">
        
        <h3 style="color:var(--neon);">+ Add New Service/Course/Account</h3>
        <select id="add-type">
            <option value="TikTok">TikTok Service</option>
            <option value="Instagram">Instagram Service</option>
            <option value="Facebook">Facebook Service</option>
            <option value="YouTube">YouTube Service</option>
            <option value="Courses">Course</option>
            <option value="Accounts">Account Sale</option>
        </select>
        <input type="text" id="add-name" placeholder="Item Name">
        <input type="number" step="0.001" id="add-price" placeholder="Price">
        <input type="text" id="add-img" placeholder="Image Name (e.g. hacking.png)">
        <button class="cta-btn" onclick="addItem()">ADD TO DATABASE</button>
        <button class="cta-btn" style="background:#fff; color:#000; margin-top:20px;" onclick="saveAdmin()">SAVE ALL CHANGES & REFRESH</button>
    </div>

    <div id="dashboard" class="container hidden">
        <div id="tiktok-sec"></div>
        <div id="insta-sec"></div>
        <div id="fb-sec"></div>
        <div id="youtube-sec"></div>
        <div id="course-sec"></div>
        <div id="account-sec"></div>

        <div class="footer">
            <h2 style="color:var(--neon); font-family:'Orbitron';">WANT TO SELL YOUR ACCOUNT?</h2>
            <p style="margin:15px 0 25px;">Sell your TikTok, Facebook or YouTube Channels at top prices.</p>
            <button class="cta-btn" style="max-width:300px;" onclick="window.open('https://wa.me/923246212898?text=I want to sell my account.')">Contact via WhatsApp</button>
            <p style="margin-top:40px; font-size:0.7rem; opacity:0.4;">ANAS ANSARI OFFICIAL STORE © 2026</p>
        </div>
    </div>

    <script>
        // Database
        let db = JSON.parse(localStorage.getItem('anasEliteV9')) || {
            TikTok: [{n:'Likes', p:0.1}, {n:'Followers', p:0.95}],
            Instagram: [{n:'Likes', p:0.35}, {n:'Followers', p:0.75}],
            Facebook: [{n:'Page Followers', p:1.05}, {n:'Post Likes', p:0.5}],
            YouTube: [{n:'Subscribers', p:2.0}, {n:'Watchtime', p:2.5}],
            Courses: [
                {n:'Graphic Designing', p:500, img:'graphic.png'},
                {n:'Ethical Hacking', p:5000, img:'hacking.png'},
                {n:'Video Editing', p:1500, img:'editing.png'},
                {n:'Freelancing', p:750, img:'freelancing.png'},
                {n:'Digital Marketing', p:1050, img:'marketing.png'},
                {n:'Web Development', p:2500, img:'development.png'}
            ],
            Accounts: [{n:'Monetized TikTok USA', p:5500, img:'id.png'}]
        };

        function toggleAuth() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('signup-box').classList.toggle('hidden');
        }

        function handleSignup() {
            let u = document.getElementById('reg-user').value;
            let p = document.getElementById('reg-pass').value;
            if(p.length < 8) return alert("Password 8+ chars!");
            localStorage.setItem('u_' + u, p); alert("Done!"); toggleAuth();
        }

        function handleLogin() {
            let u = document.getElementById('log-user').value;
            let p = document.getElementById('log-pass').value;

            if(u === "anasraza786" && p === "anasraza786") {
                document.getElementById('auth-area').style.display = 'none';
                showAdmin();
                return;
            }

            let s = localStorage.getItem('u_' + u);
            if(s && s === p) {
                window.currentUser = u;
                document.getElementById('auth-area').style.display = 'none';
                document.getElementById('nav').style.display = 'flex';
                document.getElementById('dashboard').classList.remove('hidden');
                renderStore();
            } else alert("Invalid Login!");
        }

        // --- ADMIN CONTROLS ---
        function showAdmin() {
            document.getElementById('admin-panel').style.display = 'block';
            let list = document.getElementById('price-editor-list');
            list.innerHTML = "";

            for(let cat in db) {
                list.innerHTML += `<h4 style="color:gold; margin:20px 0 10px;">${cat}</h4>`;
                db[cat].forEach((item, i) => {
                    list.innerHTML += `
                    <div class="admin-item-row">
                        <span>${item.n}</span>
                        <div>
                            Price: <input type="number" step="0.001" value="${item.p}" onchange="updatePrice('${cat}', ${i}, this.value)">
                            <button class="del-btn" onclick="delItem('${cat}', ${i})">X</button>
                        </div>
                    </div>`;
                });
            }
        }

        function updatePrice(cat, i, val) { db[cat][i].p = parseFloat(val); }
        function delItem(cat, i) { db[cat].splice(i, 1); showAdmin(); }

        function addItem() {
            let type = document.getElementById('add-type').value;
            let n = document.getElementById('add-name').value;
            let p = parseFloat(document.getElementById('add-price').value);
            let img = document.getElementById('add-img').value;
            db[type].push({n, p, img});
            showAdmin();
        }

        function saveAdmin() { localStorage.setItem('anasEliteV9', JSON.stringify(db)); location.reload(); }

        // --- STORE RENDER ---
        function renderStore() {
            const createBox = (id, title, cat, icon) => {
                let sec = document.getElementById(id);
                if(!db[cat] || db[cat].length === 0) return;
                let opts = db[cat].map(s => `<option value="${s.p}">${s.n}</option>`).join('');
                sec.innerHTML = `<div class="section-header">${title}</div>
                <div class="card">
                    <img src="${icon}">
                    <h3>${cat} Services</h3>
                    <select id="sel-${cat}" onchange="calc('${cat}')">${opts}</select>
                    <input type="number" id="qty-${cat}" value="1000" oninput="calc('${cat}')">
                    <input type="text" id="link-${cat}" placeholder="Paste Link Here">
                    <div class="price-tag">PKR <span id="tot-${cat}">${(db[cat][0].p * 1000).toFixed(2)}</span></div>
                    <button class="cta-btn" onclick="sendOrder('${cat}')">ORDER NOW</button>
                </div>`;
            };

            createBox('tiktok-sec', 'TIKTOK SERVICES', 'TikTok', 'tiktok.png');
            createBox('insta-sec', 'INSTAGRAM SERVICES', 'Instagram', 'insta.png');
            createBox('fb-sec', 'FACEBOOK SERVICES', 'Facebook', 'fb.png');
            createBox('youtube-sec', 'YOUTUBE SERVICES', 'YouTube', 'youtube.png');

            let cSec = document.getElementById('course-sec');
            cSec.innerHTML = `<div class="section-header">PREMIUM COURSES</div>`;
            db.Courses.forEach(c => {
                cSec.innerHTML += `<div class="card"><img src="${c.img}"><h3>${c.n}</h3><div class="price-tag">PKR ${c.p}</div><button class="cta-btn" onclick="sendS('Course', '${c.n}', ${c.p})">GET COURSE</button></div>`;
            });

            let aSec = document.getElementById('account-sec');
            aSec.innerHTML = `<div class="section-header">ACCOUNTS FOR SALE</div>`;
            db.Accounts.forEach(a => {
                aSec.innerHTML += `<div class="card"><img src="${a.img}"><h3>${a.n}</h3><div class="price-tag">PKR ${a.p}</div><button class="cta-btn" onclick="sendS('Account', '${a.n}', ${a.p})">BUY NOW</button></div>`;
            });
        }

        function calc(cat) {
            let p = document.getElementById('sel-' + cat).value;
            let q = document.getElementById('qty-' + cat).value || 0;
            document.getElementById('tot-' + cat).innerText = (p * q).toFixed(2);
        }

        function sendOrder(cat) {
            let s = document.getElementById('sel-' + cat).options[document.getElementById('sel-' + cat).selectedIndex].text;
            let q = document.getElementById('qty-' + cat).value;
            let l = document.getElementById('link-' + cat).value;
            let t = document.getElementById('tot-' + cat).innerText;
            if(!l) return alert("Link missing!");
            window.open(`https://wa.me/923246212898?text=*ORDER*\nUser: ${window.currentUser}\nPlatform: ${cat}\nService: ${s}\nQty: ${q}\nLink: ${l}\n*Total: ${t} PKR*`);
        }

        function sendS(type, n, p) {
            window.open(`https://wa.me/923246212898?text=*${type} ORDER*\nUser: ${window.currentUser}\nItem: ${n}\n*Price: ${p} PKR*`);
        }
    </script>
</body>
</html>
